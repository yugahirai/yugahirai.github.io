name: Update arXiv Publications

on:
  schedule:
    - cron: "0 9 * * *"  # Runs daily at 9:00 UTC (18:00 JST)
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch arXiv publications
        run: python3 update_publications.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet content/profile.md || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/profile.md
          git commit -m "Update arXiv publications"
          git push
